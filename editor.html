<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LORY — Éditeur de contenu</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Self-contained styles - clean editor UI */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: #f5f5f0; color: #2D3B4F; }

    .editor-nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(250,248,243,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid #C8BBA5; padding: 1rem 2rem;
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .editor-nav h1 { font-size: 1.1rem; font-weight: 600; }
    .editor-nav .logo { width: 36px; height: 36px; border-radius: 50%; }
    .editor-nav .actions { margin-inline-start: auto; display: flex; gap: 0.5rem; }

    .btn {
      padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem;
      font-weight: 500; cursor: pointer; border: 1px solid; transition: all 0.2s;
    }
    .btn-primary { background: #3B6C9E; color: #fff; border-color: #3B6C9E; }
    .btn-primary:hover { background: #2D5A85; }
    .btn-gold { background: #B08A3E; color: #fff; border-color: #B08A3E; }
    .btn-gold:hover { background: #96742F; }
    .btn-outline { background: transparent; color: #2D3B4F; border-color: #C8BBA5; }
    .btn-outline:hover { background: #2D3B4F; color: #fff; }

    .filters {
      padding: 1rem 2rem; display: flex; gap: 1rem; align-items: center;
      border-bottom: 1px solid #e0d8c8; background: #FAF8F3;
    }
    .filters input {
      padding: 0.5rem 0.75rem; border: 1px solid #C8BBA5; border-radius: 6px;
      font-size: 0.85rem; width: 300px; font-family: inherit;
    }
    .filters select {
      padding: 0.5rem; border: 1px solid #C8BBA5; border-radius: 6px;
      font-size: 0.85rem; font-family: inherit; background: #fff;
    }
    .stats { font-size: 0.8rem; color: #5B6B7F; margin-inline-start: auto; }

    .content-table {
      width: 100%; border-collapse: collapse; font-size: 0.85rem;
      background: #fff;
    }
    .content-table th {
      position: sticky; top: 56px; background: #2D3B4F; color: #fff;
      padding: 0.6rem 0.75rem; text-align: start; font-weight: 500;
      font-size: 0.75rem; letter-spacing: 0.05em; text-transform: uppercase;
      z-index: 10;
    }
    .content-table td {
      padding: 0.5rem 0.75rem; border-bottom: 1px solid #f0ece4;
      vertical-align: top;
    }
    .content-table tr:hover td { background: #faf8f3; }
    .content-table .col-page { width: 100px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #5B6B7F; }
    .content-table .col-context { width: 120px; font-size: 0.75rem; color: #5B6B7F; }
    .content-table .col-he { width: 35%; direction: rtl; text-align: right; }
    .content-table .col-fr { width: 35%; }

    .editable {
      min-height: 1.5em; padding: 0.3rem 0.5rem; border: 1px solid transparent;
      border-radius: 4px; transition: border-color 0.2s; cursor: text;
      line-height: 1.5; outline: none;
    }
    .editable:hover { border-color: #C8BBA5; }
    .editable:focus { border-color: #3B6C9E; background: #f8f6f0; }
    .editable.modified { background: #fff8e1; border-color: #B08A3E; }
    .editable-block {
      width: 100%; resize: vertical; font-family: inherit; font-size: 0.85rem;
      line-height: 1.5; min-height: 4em;
    }

    .page-badge {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px;
      background: #EFE7DA; font-size: 0.7rem; font-weight: 600;
    }

    #loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; font-size: 1.1rem; color: #5B6B7F;
    }
    #loading.hidden { display: none; }

    .import-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 100; align-items: center; justify-content: center;
    }
    .import-overlay.show { display: flex; }
    .import-modal {
      background: #fff; border-radius: 12px; padding: 2rem; max-width: 600px;
      width: 90%; max-height: 80vh; overflow-y: auto;
    }
    .import-modal h2 { margin-bottom: 1rem; font-size: 1.2rem; }
    .diff-item { padding: 0.5rem; border-bottom: 1px solid #f0ece4; font-size: 0.82rem; }
    .diff-item .old { color: #8B3F3F; text-decoration: line-through; }
    .diff-item .new { color: #6F7742; font-weight: 500; }

    .hidden { display: none !important; }

    @media (max-width: 768px) {
      .filters { flex-direction: column; }
      .filters input { width: 100%; }
      .content-table .col-context { display: none; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<div class="editor-nav">
  <img src="img/logo-nav.png" alt="LORY" class="logo">
  <h1>LORY — Editeur de contenu</h1>
  <div class="actions">
    <button class="btn btn-gold" onclick="exportJSON()">⬇ Exporter JSON</button>
    <label class="btn btn-outline" style="cursor:pointer;">
      ⬆ Importer JSON
      <input type="file" accept=".json" onchange="importJSON(event)" style="display:none;">
    </label>
    <a href="index.html" class="btn btn-outline">← Retour au site</a>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <input type="text" id="search" placeholder="Rechercher dans le contenu..." oninput="filterTable()">
  <select id="page-filter" onchange="filterTable()">
    <option value="">Toutes les pages</option>
    <option value="index">Synthese</option>
    <option value="porteurs">Porteurs</option>
    <option value="concept">Concept</option>
    <option value="marche">Marche</option>
    <option value="financement">Financement</option>
    <option value="previsionnel">Previsionnel</option>
    <option value="calendrier">Calendrier</option>
    <option value="annexes">Annexes</option>
  </select>
  <span class="stats" id="stats">Chargement...</span>
</div>

<!-- LOADING -->
<div id="loading">Extraction du contenu des 8 pages...</div>

<!-- TABLE -->
<table class="content-table hidden" id="table">
  <thead>
    <tr>
      <th class="col-page">Page</th>
      <th class="col-context">Contexte</th>
      <th class="col-he">Hebreu (עברית)</th>
      <th class="col-fr">Francais</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<!-- IMPORT OVERLAY -->
<div class="import-overlay" id="import-overlay">
  <div class="import-modal">
    <h2>Modifications detectees</h2>
    <div id="diff-list"></div>
    <div style="margin-top:1.5rem; display:flex; gap:0.5rem; justify-content:flex-end;">
      <button class="btn btn-outline" onclick="closeImport()">Annuler</button>
      <button class="btn btn-primary" onclick="applyImport()">Appliquer les modifications</button>
    </div>
  </div>
</div>

<script>
const PAGES = ['index', 'porteurs', 'concept', 'marche', 'financement', 'previsionnel', 'calendrier', 'annexes'];
let contentData = [];
let importedData = null;

// Extract ALL bilingual text pairs — finds every span.he and its matching span.fr
function extractContent(html, pageName) {
  var parser = new DOMParser();
  var doc = parser.parseFromString(html, 'text/html');
  var entries = [];
  var idx = 0;
  var seenHe = new Set();

  // Find ALL span.he in the document
  var heSpans = doc.querySelectorAll('span.he');
  heSpans.forEach(function(heSpan) {
    if (seenHe.has(heSpan)) return;

    // Find the matching span.fr — check siblings in same parent
    var frSpan = null;
    var parent = heSpan.parentElement;
    if (!parent) return;

    // Check all siblings for span.fr
    for (var i = 0; i < parent.children.length; i++) {
      var sib = parent.children[i];
      if (sib !== heSpan && sib.tagName === 'SPAN' && sib.classList.contains('fr')) {
        frSpan = sib;
        break;
      }
    }

    // If heSpan is nested deeper, go up one level
    if (!frSpan && parent.parentElement) {
      var gp = parent.parentElement;
      for (var i = 0; i < gp.children.length; i++) {
        var uncle = gp.children[i];
        if (uncle.tagName === 'SPAN' && uncle.classList.contains('fr')) {
          frSpan = uncle;
          break;
        }
        if (uncle.querySelector) {
          var nested = uncle.querySelector('span.fr');
          if (nested && !seenHe.has(nested)) { frSpan = nested; break; }
        }
      }
    }

    seenHe.add(heSpan);

    var hePlain = heSpan.textContent.trim();
    var frPlain = frSpan ? frSpan.textContent.trim() : '';

    if (!hePlain && !frPlain) return;

    // Context: parent tag + first meaningful class
    var tag = parent.tagName.toLowerCase();
    var cls = '';
    if (parent.className) {
      cls = parent.className.split(' ').filter(function(c) {
        return c && c !== 'he' && c !== 'fr' && c !== 'reveal' && c !== 'visible';
      })[0] || '';
    }
    var context = tag + (cls ? '.' + cls : '');
    var isLong = hePlain.length > 100 || frPlain.length > 100;

    entries.push({
      id: pageName + '_' + idx,
      page: pageName,
      context: context,
      type: isLong ? 'block' : 'inline',
      he: hePlain,
      fr: frPlain
    });
    idx++;
  });

  return entries;
}

// Load all pages
async function loadAll() {
  contentData = [];

  for (var i = 0; i < PAGES.length; i++) {
    var page = PAGES[i];
    try {
      var resp = await fetch(page + '.html');
      if (!resp.ok) continue;
      var html = await resp.text();
      var entries = extractContent(html, page);
      contentData = contentData.concat(entries);
    } catch(e) {
      console.warn('Could not load ' + page + '.html:', e);
    }
  }

  renderTable();
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('table').classList.remove('hidden');
}

// Render table
function renderTable() {
  var tbody = document.getElementById('tbody');
  var html = '';

  contentData.forEach(function(item, i) {
    html += '<tr data-id="' + item.id + '" data-page="' + item.page + '">';
    html += '<td class="col-page"><span class="page-badge">' + item.page + '</span></td>';
    html += '<td class="col-context">' + item.context + '</td>';
    if (item.type === 'block') {
      html += '<td class="col-he"><textarea class="editable editable-block" data-field="he" data-idx="' + i + '" dir="rtl" rows="3">' + escapeHtml(item.he) + '</textarea></td>';
      html += '<td class="col-fr"><textarea class="editable editable-block" data-field="fr" data-idx="' + i + '" rows="3">' + escapeHtml(item.fr) + '</textarea></td>';
    } else {
      html += '<td class="col-he"><div class="editable" contenteditable="true" data-field="he" data-idx="' + i + '" dir="rtl">' + escapeHtml(item.he) + '</div></td>';
      html += '<td class="col-fr"><div class="editable" contenteditable="true" data-field="fr" data-idx="' + i + '">' + escapeHtml(item.fr) + '</div></td>';
    }
    html += '</tr>';
  });

  tbody.innerHTML = html;
  updateStats();

  // Listen for edits — handle both contenteditable divs and textareas
  tbody.querySelectorAll('.editable').forEach(function(el) {
    el.addEventListener('input', function() {
      var idx = parseInt(el.dataset.idx);
      var field = el.dataset.field;
      contentData[idx][field] = (el.tagName === 'TEXTAREA') ? el.value.trim() : el.textContent.trim();
      el.classList.add('modified');
    });
  });
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function updateStats() {
  var visible = document.querySelectorAll('#tbody tr:not(.hidden)').length;
  document.getElementById('stats').textContent = visible + ' / ' + contentData.length + ' entrees';
}

// Filter
function filterTable() {
  var search = document.getElementById('search').value.toLowerCase();
  var pageFilter = document.getElementById('page-filter').value;

  document.querySelectorAll('#tbody tr').forEach(function(tr) {
    var matchPage = !pageFilter || tr.dataset.page === pageFilter;
    var matchSearch = !search || tr.textContent.toLowerCase().indexOf(search) !== -1;
    tr.classList.toggle('hidden', !(matchPage && matchSearch));
  });

  updateStats();
}

// Export JSON
function exportJSON() {
  var data = {
    exportDate: new Date().toISOString(),
    version: '3.0',
    site: 'LORY Events & Catering — Dossier bancaire',
    totalEntries: contentData.length,
    content: contentData
  };

  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'lory-content-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

// Import JSON
function importJSON(event) {
  var file = event.target.files[0];
  if (!file) return;

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      importedData = data.content || data;
      showDiff();
    } catch(err) {
      alert('Erreur de parsing JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function showDiff() {
  if (!importedData) return;

  var diffHtml = '';
  var changes = 0;

  importedData.forEach(function(imported) {
    var original = contentData.find(function(c) { return c.id === imported.id; });
    if (!original) return;

    if (original.he !== imported.he) {
      changes++;
      diffHtml += '<div class="diff-item">';
      diffHtml += '<strong>' + imported.page + '</strong> — Hebreu<br>';
      diffHtml += '<span class="old">' + escapeHtml(original.he) + '</span><br>';
      diffHtml += '<span class="new">' + escapeHtml(imported.he) + '</span>';
      diffHtml += '</div>';
    }
    if (original.fr !== imported.fr) {
      changes++;
      diffHtml += '<div class="diff-item">';
      diffHtml += '<strong>' + imported.page + '</strong> — Francais<br>';
      diffHtml += '<span class="old">' + escapeHtml(original.fr) + '</span><br>';
      diffHtml += '<span class="new">' + escapeHtml(imported.fr) + '</span>';
      diffHtml += '</div>';
    }
  });

  if (changes === 0) {
    diffHtml = '<p style="color:#5B6B7F;">Aucune modification detectee.</p>';
  } else {
    diffHtml = '<p style="margin-bottom:1rem; color:#B08A3E; font-weight:500;">' + changes + ' modification(s) detectee(s)</p>' + diffHtml;
  }

  document.getElementById('diff-list').innerHTML = diffHtml;
  document.getElementById('import-overlay').classList.add('show');
}

function closeImport() {
  document.getElementById('import-overlay').classList.remove('show');
  importedData = null;
}

function applyImport() {
  if (!importedData) return;

  importedData.forEach(function(imported) {
    var idx = contentData.findIndex(function(c) { return c.id === imported.id; });
    if (idx === -1) return;
    contentData[idx].he = imported.he;
    contentData[idx].fr = imported.fr;
  });

  renderTable();
  closeImport();
}

// Init
document.addEventListener('DOMContentLoaded', loadAll);
</script>
</body>
</html>
